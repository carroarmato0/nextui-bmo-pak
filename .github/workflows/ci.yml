name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # BMO links against SDL2 (renderer + bmo-pak need CGO); pure-Go-only builds
      # fail on those packages. Install the dev headers so the full tree compiles.
      - name: Install SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build ./...

      # Matches the project's documented test standard (CGO_ENABLED=1 go test
      # ./...). -race is intentionally omitted: the race detector's memory
      # overhead pushes the allocation-bound face tests over their per-call
      # budget on CI runners, and race is a separate, optional local check.
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
        env:
          CGO_ENABLED: "1"
